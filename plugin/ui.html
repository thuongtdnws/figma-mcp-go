<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>figma-mcp-go</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        background: #1e1e1e;
        color: #e0e0e0;
        height: 100vh;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 16px;
        gap: 12px;
      }

      .info-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-label { color: #888; }
      .info-value { color: #e0e0e0; font-weight: 500; }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .author {
        display: flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        color: #888;
        font-size: 11px;
      }

      .author:hover { color: #e0e0e0; }

      .author img {
        width: 20px;
        height: 20px;
        border-radius: 50%;
      }

      .badge {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
      }

      .badge.connected    { background: #1a472a; color: #4ade80; }
      .badge.disconnected { background: #3a1a1a; color: #f87171; }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #f87171;
      }

      .dot.connected { background: #4ade80; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="info-section">
        <div class="info-row">
          <span class="info-label">File</span>
          <span class="info-value" id="file-name">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Selection</span>
          <span class="info-value" id="selection-count">0 node(s)</span>
        </div>
      </div>
      <div class="footer">
        <a class="author" href="https://github.com/vkhanhqui/figma-mcp-go" target="_blank">
          <img src="https://avatars.githubusercontent.com/u/64468109?v=4" alt="avatar" />
          vkhanhqui
        </a>
        <div class="badge disconnected" id="status-badge">
          <span class="dot" id="dot"></span>
          <span id="badge-text">Disconnected</span>
        </div>
      </div>
    </div>
    <script>
      var WS_URL = "ws://localhost:1994/ws";
      var RECONNECT_DELAY_MS = 1500;

      var socket = null;
      var reconnectTimer = null;

      function setConnected(state) {
        var dot = document.getElementById("dot");
        var badgeText = document.getElementById("badge-text");
        var badge = document.getElementById("status-badge");
        dot.className = state ? "dot connected" : "dot";
        badgeText.textContent = state ? "Connected" : "Disconnected";
        badge.className = state ? "badge connected" : "badge disconnected";
      }

      function setStatus(status) {
        document.getElementById("file-name").textContent = status.fileName;
        document.getElementById("selection-count").textContent = status.selectionCount + " node(s)";
      }

      function connect() {
        if (socket) socket.close();

        socket = new WebSocket(WS_URL);

        socket.onopen = function () {
          setConnected(true);
          parent.postMessage({ pluginMessage: { type: "ui-ready" } }, "*");
        };

        socket.onclose = function () {
          setConnected(false);
          socket = null;
          if (reconnectTimer === null) {
            reconnectTimer = setTimeout(function () {
              reconnectTimer = null;
              connect();
            }, RECONNECT_DELAY_MS);
          }
        };

        socket.onerror = function () {
          setConnected(false);
        };

        socket.onmessage = function (event) {
          try {
            var payload = JSON.parse(event.data);
            parent.postMessage({ pluginMessage: { type: "server-request", payload: payload } }, "*");
          } catch (e) {
            // ignore malformed frames
          }
        };
      }

      window.addEventListener("message", function (event) {
        var msg = event.data && event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "plugin-status") {
          setStatus(msg.payload);
          return;
        }

        if ("requestId" in msg) {
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(msg));
          }
        }
      });

      connect();
    </script>
  </body>
</html>
